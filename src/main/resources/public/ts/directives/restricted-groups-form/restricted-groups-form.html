<!-- Button to open/close modal -->
<button class="display-inline-block remove-margin padding-height-sm padding-width-md text-sm radius-sm"
        ng-click="vm.openRestrictedGroupsForm()">
    <i18n>progression.from.session.save</i18n>
</button>

<!-- Create Progression from Session -->
<lightbox show="vm.restrictedGroupsLightboxOpened" class="lightbox create-visa" on-close="vm.closeRestrictedGroupsForm()">
    <!-- Lightbox title -->
    <section class="head">
        <h3>
            <i18n>
                restricted.group
            </i18n>
        </h3>
    </section>

    <!-- Create warning/folder selector -->
    <section class="confirm-context">
        <div class="cell horizontal-spacing twelve margin-top-md">
            <i18n>restricted.group.create</i18n>
            <input type="text" ng-model="vm.restrictedGroup.label"/>
            [[vm.restrictedGroup.label]]
        </div>
        <div ng-if="vm.oldRestrictedGroups && vm.oldRestrictedGroups.length > 0" class="cell horizontal-spacing twelve margin-top-md">
            <i18n>restricted.group.from.created.group</i18n>
            <select>
                <option ng-if="false" value="" label=""></option>
            </select>
        </div>
        <div ng-include="vm.roots.directive + 'restricted-groups-form/restricted-groups-students-list.html'"></div>
    </section>


    <!-- Footer/buttons -->
    <section class="body row">

        <!-- Confirm buttons -->
        <div class="confirm-buttons">

            <!--create-->
            <button
                    class="right-magnet">
                <i18n>save</i18n>
            </button>

            <button ng-click="vm.closeRestrictedGroupsForm()"
                    class="right-magnet cancel">
                <i18n>utils.cancel</i18n>
            </button>
        </div>
    </section>
</lightbox>
